

name: Deploy Node.js to AWS

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Project root folder-kku ponga. Folder illana clone pannum.
            if [ ! -d "NodeJs-Backend-Learing" ]; then
              git clone https://github.com/${{ github.repository }} NodeJs-Backend-Learing
            fi
            
            cd NodeJs-Backend-Learing/blog/backend
            
            # Git pull panna munnadi permissions fix panna (Sila neram error varum)
            git config --global --add safe.directory /home/ubuntu/NodeJs-Backend-Learing
            
            git pull origin main
            npm install --production
            
            # PM2 restart
            pm2 delete backend || true
            pm2 start server.js --name "backend"