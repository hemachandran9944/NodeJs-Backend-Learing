name: Deploy Node.js to AWS

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Latest v6 version use 
      - name: Checkout Code
        uses: actions/checkout@v6

      # 2. Check Code 
      - name: Validate Code And Syntax Error
        run: |
          cd blog/backend
          npm install
          node --check server.js
          node -e "require('./server.js')" 

          

      - name: Validate Code and Variables
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}  
        run : |
          cd blog/backend
          npm install
          timeout 15s node server.js || [ $? -eq 124 ]  

      # 3. Check Code --------------> Succes This Code 

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ ! -d "NodeJs-Backend-Learing" ]; then
              git clone https://github.com/${{ github.repository }} NodeJs-Backend-Learing
            fi
            
            cd ~/NodeJs-Backend-Learing
            git config --global --add safe.directory /home/ubuntu/NodeJs-Backend-Learing
            git pull origin main
            
            cd blog/backend
            npm install --production

            # Env setup
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "PORT=8000" >> .env
            
            # App restart
            pm2 delete backend-app || true
            pm2 start server.js --name "backend-app"
            pm2 save